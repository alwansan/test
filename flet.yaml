app:
  module: main
  name: B-Ultra
  description: YouTube Downloader
  org: com.bulttra
  version: 1.4.0
  build_number: 14

android:
  permissions:
    - INTERNET
    - ACCESS_NETWORK_STATE
    - ACCESS_WIFI_STATE
    - WRITE_EXTERNAL_STORAGE
    - READ_EXTERNAL_STORAGE
    - MANAGE_EXTERNAL_STORAGE
    - REQUEST_IGNORE_BATTERY_OPTIMIZATIONS
    - FOREGROUND_SERVICE
    - WAKE_LOCK
  meta_data:
    - name: android.requestLegacyExternalStorage
      value: "true"
